<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background lines (X pattern) -->
  <g stroke="#000" stroke-width="24" stroke-linecap="round">
    <!-- Top-left lines -->
    <line x1="40" y1="40" x2="180" y2="180"/>
    <line x1="70" y1="30" x2="200" y2="160"/>
    <line x1="30" y1="70" x2="160" y2="200"/>

    <!-- Top-right lines -->
    <line x1="472" y1="40" x2="332" y2="180"/>
    <line x1="442" y1="30" x2="312" y2="160"/>
    <line x1="482" y1="70" x2="352" y2="200"/>

    <!-- Bottom-left lines -->
    <line x1="40" y1="472" x2="180" y2="332"/>
    <line x1="70" y1="482" x2="200" y2="352"/>
    <line x1="30" y1="442" x2="160" y2="312"/>

    <!-- Bottom-right lines -->
    <line x1="472" y1="472" x2="332" y2="332"/>
    <line x1="442" y1="482" x2="312" y2="352"/>
    <line x1="482" y1="442" x2="352" y2="312"/>
  </g>

  <!-- Main circle -->
  <circle cx="256" cy="256" r="190" fill="white" stroke="#000" stroke-width="20"/>

  <!-- Four colored dots -->
  <circle cx="195" cy="195" r="55" fill="#808080"/> <!-- Gray - top left -->
  <circle cx="317" cy="195" r="55" fill="#FF0000"/> <!-- Red - top right -->
  <circle cx="195" cy="317" r="55" fill="#FFFF00"/> <!-- Yellow - bottom left -->
  <circle cx="317" cy="317" r="55" fill="#0000FF"/> <!-- Blue - bottom right -->
</svg>
