[features]
seeds = false
skip-lint = false

[programs.devnet]
jtx_vault = "JTX5uXTiZ1M3hJkjv5Cp5F8dr3Jc7nhJbQjCFmgEYA7"

[programs.mainnet]
jtx_vault = "JTX5uXTiZ1M3hJkjv5Cp5F8dr3Jc7nhJbQjCFmgEYA7"

[registry]
url = "https://api.apr.dev"

[provider]
# Default to devnet for safe testing. Override with:
#   anchor deploy --provider.cluster mainnet
#   ANCHOR_PROVIDER_URL=https://mainnet.helius-rpc.com/?api-key=<KEY> anchor deploy
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# ─── Helius RPC Configuration ───
# Devnet:  https://devnet.helius-rpc.com/?api-key=98ca6456-20a8-4518-8393-1b9ee6c2b7f3
# Mainnet: https://mainnet.helius-rpc.com/?api-key=<YOUR_HELIUS_KEY>
#
# To deploy on mainnet with Helius:
#   export ANCHOR_PROVIDER_URL="https://mainnet.helius-rpc.com/?api-key=<KEY>"
#   anchor build && anchor deploy --provider.cluster mainnet
#
# Generate a program keypair:
#   solana-keygen grind --starts-with JTX:1
#   Then update declare_id!() in lib.rs and program IDs above
